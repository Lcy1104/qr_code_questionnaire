<!-- questionnaire/templates/registration/locked.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账户暂时锁定</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .lockout-container {
            max-width: 500px;
            margin: 100px auto;
            padding: 30px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .lockout-icon {
            font-size: 64px;
            color: #dc3545;
            margin-bottom: 20px;
        }
        .timer {
            font-size: 24px;
            font-weight: bold;
            color: #dc3545;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="lockout-container text-center">
        <div class="lockout-icon">
            <i class="fas fa-lock"></i>
        </div>
        <h2 class="mb-3">账户暂时锁定</h2>
        <p class="text-muted mb-4">
            由于多次登录失败，您的账户已被暂时锁定以保护安全。
        </p>

        <div class="timer" id="countdown">
            解锁倒计时: <span id="time">60:00</span>
        </div>

        <p class="text-muted mb-4">
            锁定将在 <strong id="unlock-time"></strong> 后自动解除。
        </p>

        <div class="alert alert-info text-start">
            <h6><i class="fas fa-lightbulb me-2"></i>安全提示：</h6>
            <ul class="mb-0">
                <li>请确认您输入的账号和密码是否正确</li>
                <li>如忘记密码，可使用<a href="{% url 'password_reset' %}" class="alert-link">密码重置</a>功能</li>
                <li>建议使用强密码并定期更换</li>
            </ul>
        </div>

        <div class="mt-4">
            <a href="{% url 'home' %}" class="btn btn-outline-secondary me-2">
                <i class="fas fa-home me-1"></i>返回首页
            </a>
            <button onclick="location.reload()" class="btn btn-primary">
                <i class="fas fa-sync-alt me-1"></i>重新尝试
            </button>
        </div>

        <div class="mt-4 pt-3 border-top">
            <small class="text-muted">
                如需立即解锁，请联系系统管理员或等待锁定时间结束。
            </small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>

    <script>
        // 计算解锁时间（当前时间 + 60分钟）
        const now = new Date();
        const unlockTime = new Date(now.getTime() + 60 * 60 * 1000); // 60分钟后

        // 格式化解锁时间显示
        document.getElementById('unlock-time').textContent =
            unlockTime.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});

        // 倒计时功能
        function updateCountdown() {
            const now = new Date();
            const diff = unlockTime - now;

            if (diff <= 0) {
                document.getElementById('time').textContent = '00:00';
                document.getElementById('countdown').innerHTML =
                    '<span class="text-success">锁定已解除，请<a href="{% url "login" %}">重新登录</a></span>';
                return;
            }

            const minutes = Math.floor(diff / 1000 / 60);
            const seconds = Math.floor((diff / 1000) % 60);

            document.getElementById('time').textContent =
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
