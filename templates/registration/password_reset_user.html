<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>重置密码 - 输入用户名</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-header text-center bg-primary text-white">
                    <h5>重置密码 - 第一步</h5>
                </div>
                <div class="card-body">
                    <!-- 修改：参考 login.html，使用 error 变量显示错误信息 -->
                    {% if error %}
                    <div class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
                        {{ error }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endif %}
                    
                    <!-- 修改：表单 action 留空，提交到当前 URL -->
                    <form method="post" id="resetUserForm" action="">
                        {% csrf_token %}
                        
                        <!-- 用户名 -->
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" name="username" 
                                   class="form-control" 
                                   value="{{ username|default_if_none:'' }}"
                                   placeholder="请输入用户名" 
                                   required
                                   autocomplete="username"
                                   autofocus>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">下一步</button>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <p class="mb-0">
                        <a href="{% url 'login' %}">返回登录</a> |
                        <a href="{% url 'register' %}">注册新账号</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
