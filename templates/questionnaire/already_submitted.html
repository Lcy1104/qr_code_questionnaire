<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>已提交 - {{ questionnaire.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-warning text-white">
                        <h4 class="mb-0"><i class="fas fa-exclamation-triangle me-2"></i>问卷已提交</h4>
                    </div>
                    <div class="card-body text-center py-5">
                        <div class="mb-4">
                            <i class="fas fa-check-circle fa-5x text-success mb-4"></i>
                            <h3>您已经成功提交问卷</h3>
                            <p class="lead">问卷标题：<strong>{{ questionnaire.title }}</strong></p>
                            <p class="text-muted">每个用户只能提交一次问卷，感谢您的参与！</p>
                        </div>

                        <div class="row mt-4">
                            <div class="col-md-6 mb-3">
                                <div class="card">
                                    <div class="card-body">
                                        <h5><i class="fas fa-chart-bar me-2"></i>查看统计</h5>
                                        <p class="text-muted small">查看此问卷的整体统计结果</p>
                                        <a href="{% url 'questionnaire_detail' questionnaire.id %}" class="btn btn-outline-primary btn-sm">
                                            查看详情
                                        </a>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <div class="card">
                                    <div class="card-body">
                                        <h5><i class="fas fa-list me-2"></i>其他问卷</h5>
                                        <p class="text-muted small">浏览并填写其他问卷</p>
                                        <a href="{% url 'questionnaire_list' %}" class="btn btn-outline-success btn-sm">
                                            浏览问卷
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mt-4">
                            <a href="{% url 'dashboard' %}" class="btn btn-primary">
                                <i class="fas fa-home me-2"></i>返回仪表盘
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
