<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择评价目标 - {{ questionnaire.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 3rem; }
        .container { max-width: 600px; }
        .card { border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .radio-group { margin: 1.5rem 0; }
        .form-check { padding: 0.75rem; border-radius: 8px; transition: background-color 0.2s; }
        .form-check:hover { background-color: #f1f3f5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">{{ questionnaire.title }}</h4>
            </div>
            <div class="card-body">
                <p class="lead">请选择您要评价的对象：</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="radio-group">
                        {% for radio in form.target %}
                            <div class="form-check">
                                {{ radio.tag }}
                                <label class="form-check-label" for="{{ radio.id_for_label }}">
                                    {{ radio.choice_label }}
                                </label>
                            </div>
                        {% endfor %}
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">下一步，开始评价</button>
                        <a href="{% url 'questionnaire_detail' questionnaire.id %}" class="btn btn-outline-secondary">返回详情</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
