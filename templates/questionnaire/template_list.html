<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预设模板 - 问卷系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 2rem; }
        .card { transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .container { max-width: 1200px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>📋 预设模板</h1>
            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">返回仪表盘</a>
        </div>

        {% if templates %}
            <div class="row g-4">
                {% for template in templates %}
                    <div class="col-md-4">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">{{ template.title }}</h5>
                                <p class="card-text text-muted">{{ template.description|default:'无描述'|truncatechars:80 }}</p>
                                <p class="card-text">
                                    <small class="text-secondary">问题数：{{ template.questions.count }}</small>
                                </p>
                            </div>
                            <div class="card-footer bg-transparent border-0">
                                <a href="{% url 'create_from_template' template.id %}" class="btn btn-primary w-100">使用此模板创建</a>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="alert alert-info">暂无预设模板，请等待管理员添加。</div>
        {% endif %}
    </div>
</body>
</html>
