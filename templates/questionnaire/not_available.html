<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问卷不可用</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏（如果项目有 navbar.html，可以包含它） -->
    {% include 'navbar.html' %}

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-warning text-white">
                        <h4 class="mb-0">问卷不可用</h4>
                    </div>
                    <div class="card-body text-center">
                        <i class="fas fa-exclamation-triangle fa-3x text-warning mb-3"></i>
                        <h5 class="card-title">问卷暂时无法访问</h5>
                        <p class="card-text">{{ reason|default:"该问卷未发布或已结束。" }}</p>
                        <a href="{% url 'dashboard' %}" class="btn btn-primary">
                            <i class="fas fa-tachometer-alt me-1"></i>返回仪表盘
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 如果需要 Bootstrap JS 和 Font Awesome（项目中已有） -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</body>
</html>
