<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择创建方式 - 问卷系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 4rem; }
        .choice-card {
            border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.2s; cursor: pointer; text-decoration: none; color: inherit; display: block;
        }
        .choice-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        .choice-icon { font-size: 4rem; color: #0d6efd; margin-bottom: 1rem; }
        .container { max-width: 900px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-5">📝 创建问卷</h1>
        <div class="row g-4">
            <div class="col-md-6">
                <a href="{% url 'create_questionnaire' %}" class="choice-card card">
                    <div class="card-body text-center p-5">
                        <div class="choice-icon">✍️</div>
                        <h3>手动创建</h3>
                        <p class="text-muted">从零开始设计问卷，自由添加问题、选项</p>
                    </div>
                </a>
            </div>
            <div class="col-md-6">
                <a href="{% url 'template_list' %}" class="choice-card card">
                    <div class="card-body text-center p-5">
                        <div class="choice-icon">📋</div>
                        <h3>从模板创建</h3>
                        <p class="text-muted">使用预设模板快速生成问卷，可二次编辑</p>
                    </div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
