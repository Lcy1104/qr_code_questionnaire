<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
        }
        .sidebar {
            background: #ffffff;
            min-height: 100vh;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .sidebar-menu {
            padding: 20px 0;
        }
        .nav-link {
            color: #333;
            padding: 10px 20px;
            transition: all 0.3s;
        }
        .nav-link:hover, .nav-link.active {
            background: #e3f2fd;
            color: #667eea;
            border-left: 3px solid #667eea;
        }
        .main-content {
            padding: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .stat-icon {
            font-size: 40px;
            color: #667eea;
        }
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .action-btn {
            background: white;
            border: none;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            color: #667eea;
        }
        .action-icon {
            font-size: 30px;
            color: #667eea;
            margin-bottom: 10px;
        }
        @media (max-width: 768px) {
            .sidebar {
                min-height: auto;
            }
            .quick-actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-3 col-lg-2 sidebar">
                <div class="sidebar-header">
                    <h4><i class="fas fa-poll me-2"></i>问卷系统</h4>
                    <p class="mb-0 small">欢迎, {{ username }}</p>
                </div>
                
                <nav class="sidebar-menu">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" href="{% url 'manage_users' %}">
                                 <i class="fas fa-user-friends me-2"></i>用户管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/admin/">
                                <i class="fas fa-cog me-2"></i>管理后台
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/admin/questionnaire/questionnaire/">
                                <i class="fas fa-list me-2"></i>问卷管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/admin/questionnaire/userresponse/">
                                <i class="fas fa-users me-2"></i>答卷管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/admin/questionnaire/user/">
                                <i class="fas fa-user-friends me-2"></i>用户管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <hr>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/logout/">
                                <i class="fas fa-sign-out-alt me-2"></i>退出登录
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
            
            <!-- 主内容区 -->
            <div class="col-md-9 col-lg-10 main-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-tachometer-alt me-2"></i>{{ title }}</h2>
                    <div class="btn-group">
                        <a href="/admin/questionnaire/questionnaire/add/" class="btn btn-primary">
                            <i class="fas fa-plus me-2"></i>创建问卷
                        </a>
                        <a href="/admin/" class="btn btn-outline-secondary">
                            <i class="fas fa-cog me-2"></i>系统设置
                        </a>
                    </div>
                </div>
                
                <!-- 统计卡片 -->
                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="d-flex align-items-center">
                                <div class="stat-icon me-3">
                                    <i class="fas fa-file-alt"></i>
                                </div>
                                <div>
                                    <h5 class="mb-1">问卷总数</h5>
                                    <h3 class="mb-0">0</h3>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="d-flex align-items-center">
                                <div class="stat-icon me-3">
                                    <i class="fas fa-users"></i>
                                </div>
                                <div>
                                    <h5 class="mb-1">答卷数量</h5>
                                    <h3 class="mb-0">0</h3>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="d-flex align-items-center">
                                <div class="stat-icon me-3">
                                    <i class="fas fa-check-circle"></i>
                                </div>
                                <div>
                                    <h5 class="mb-1">完成率</h5>
                                    <h3 class="mb-0">0%</h3>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="d-flex align-items-center">
                                <div class="stat-icon me-3">
                                    <i class="fas fa-clock"></i>
                                </div>
                                <div>
                                    <h5 class="mb-1">今日新增</h5>
                                    <h3 class="mb-0">0</h3>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 快速操作 -->
                <h4 class="mb-3">快速操作</h4>
                <div class="quick-actions">
                    <a href="/admin/questionnaire/questionnaire/add/" class="action-btn">
                        <div class="action-icon">
                            <i class="fas fa-plus-circle"></i>
                        </div>
                        <h6>创建问卷</h6>
                        <p class="small text-muted">创建新的调查问卷</p>
                    </a>
                    
                    <a href="{% url 'questionnaire_list' %}?status=draft" class="action-btn">
                        <div class="action-icon">
                            <i class="fas fa-file-alt"></i>
                        </div>
                        <h6>草稿区</h6>
                        <p class="small text-muted">查看所有草稿问卷</p>
                    </a>
                    
                    <a href="/admin/questionnaire/questionnaire/" class="action-btn">
                        <div class="action-icon">
                            <i class="fas fa-chart-bar"></i>
                        </div>
                        <h6>查看统计</h6>
                        <p class="small text-muted">查看问卷统计结果</p>
                    </a>
                    
                    <a href="/admin/questionnaire/user/" class="action-btn">
                        <div class="action-icon">
                            <i class="fas fa-user-cog"></i>
                        </div>
                        <h6>用户管理</h6>
                        <p class="small text-muted">管理系统用户</p>
                    </a>
                </div>
                
                <!-- 最近活动 -->
                <div class="row mt-5">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="mb-0"><i class="fas fa-history me-2"></i>最近活动</h5>
                            </div>
                            <div class="card-body">
                                <div class="text-center py-5">
                                    <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                                    <p class="text-muted">暂无活动记录</p>
                                    <p class="small text-muted">开始创建问卷以查看活动记录</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
